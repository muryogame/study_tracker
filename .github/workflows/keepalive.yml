name: Keep-alive ping

on:
  schedule:
    # 10分ごとにpingしてRenderのスリープを防止 (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render server
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "RENDER_URL secret not set. Skipping."
            exit 0
          fi
          echo "Pinging ${RENDER_URL}/api/ping ..."
          curl -sf --max-time 60 "${RENDER_URL}/api/ping" \
            && echo "OK - server is awake" \
            || echo "Ping failed (server may be cold-starting)"
